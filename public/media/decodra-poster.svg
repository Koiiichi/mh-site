<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Decodra confidence-aware decoding</title>
  <desc>A minimal structured output and confidence trace diagram for Decodra.</desc>
  <rect width="1280" height="720" fill="#f7f7f6"/>
  <rect x="96" y="92" width="1088" height="536" rx="32" fill="#ffffff" stroke="#dededb"/>
  <text x="142" y="170" font-family="Geist, Inter, system-ui, sans-serif" font-size="48" font-weight="600" fill="#111111">Decodra</text>
  <text x="142" y="220" font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace" font-size="18" letter-spacing="3" fill="#777777">SCHEMA VALIDITY WITH FIELD CONFIDENCE</text>
  <rect x="150" y="300" width="430" height="260" rx="22" fill="#fbfbfa" stroke="#dededb"/>
  <g font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace" font-size="24" fill="#111111">
    <text x="190" y="365">{</text>
    <text x="226" y="410">"answer": "approved",</text>
    <text x="226" y="460">"risk": 0.18,</text>
    <text x="226" y="510">"confidence": 0.91</text>
    <text x="190" y="545">}</text>
  </g>
  <g transform="translate(700 310)" font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace" font-size="18" fill="#111111">
    <text x="0" y="0">field confidence</text>
    <rect x="0" y="44" width="340" height="18" rx="9" fill="#e6e6e2"/>
    <rect x="0" y="44" width="309" height="18" rx="9" fill="#111111"/>
    <text x="0" y="96">constraint pressure</text>
    <rect x="0" y="140" width="340" height="18" rx="9" fill="#e6e6e2"/>
    <rect x="0" y="140" width="122" height="18" rx="9" fill="#111111"/>
    <text x="0" y="192">schema validity</text>
    <rect x="0" y="236" width="340" height="18" rx="9" fill="#e6e6e2"/>
    <rect x="0" y="236" width="333" height="18" rx="9" fill="#111111"/>
  </g>
</svg>
