<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Vellum email-to-filing pipeline</title>
  <desc>A minimal diagram showing a Gmail request moving through Vellum to a ZIP archive response.</desc>
  <rect width="1280" height="720" fill="#f7f7f6"/>
  <rect x="90" y="86" width="1100" height="548" rx="34" fill="#ffffff" stroke="#dededb"/>
  <g transform="translate(140 132)">
    <path d="M8,0 L45,0 L68,24 L68,82 Q68,90 60,90 L8,90 Q0,90 0,82 L0,8 Q0,0 8,0 Z" fill="none" stroke="#111111" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="45,0 68,24 45,24" fill="#111111"/>
    <text x="94" y="56" font-family="Geist, Inter, system-ui, sans-serif" font-size="44" font-weight="600" fill="#111111">vellum</text>
  </g>
  <text x="140" y="270" font-family="Geist, Inter, system-ui, sans-serif" font-size="31" font-weight="500" fill="#111111">Inbox requests become packaged filings.</text>
  <text x="140" y="320" font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace" font-size="18" letter-spacing="3" fill="#777777">GMAIL  /  PUBSUB  /  FASTAPI  /  PLAYWRIGHT  /  ZIP</text>
  <g fill="none" stroke="#151515" stroke-width="2">
    <rect x="148" y="416" width="160" height="88" rx="18"/>
    <rect x="420" y="416" width="160" height="88" rx="18"/>
    <rect x="692" y="416" width="160" height="88" rx="18"/>
    <rect x="964" y="416" width="160" height="88" rx="18"/>
  </g>
  <g font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace" font-size="17" fill="#111111" text-anchor="middle">
    <text x="228" y="467">REQUEST</text>
    <text x="500" y="467">PARSE</text>
    <text x="772" y="467">SCRAPE</text>
    <text x="1044" y="467">REPLY.ZIP</text>
  </g>
  <g stroke="#999999" stroke-width="1.6" stroke-linecap="round">
    <line x1="330" y1="460" x2="390" y2="460"/>
    <line x1="602" y1="460" x2="662" y2="460"/>
    <line x1="874" y1="460" x2="934" y2="460"/>
  </g>
  <g fill="#111111">
    <path d="M390 460 L378 453 L378 467 Z"/>
    <path d="M662 460 L650 453 L650 467 Z"/>
    <path d="M934 460 L922 453 L922 467 Z"/>
  </g>
</svg>
